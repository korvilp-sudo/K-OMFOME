<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-OMFOME</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<!-- HEADER -->
<header class="topo">
  <h1>K-OMFOME</h1>
  <p>Sabor do futuro no seu pedido</p>
  <button onclick="abrirSecao('cardapio')">Ver Cardápio</button>
</header>

<!-- HOME -->
<section id="home" class="secao ativa">
  <h2>Bem-vindo</h2>
  <p>Peça rápido, simples e direto.</p>
</section>

<!-- CARDÁPIO -->
<section id="cardapio" class="secao">

  <h2>🍽️ Cardápio</h2>

  <div id="produtos"></div>

</section>

<!-- CARRINHO -->
<section id="carrinho" class="secao">

  <h2>🛒 Carrinho</h2>

  <div id="itensCarrinho"></div>

  <h3 id="total"></h3>

  <button onclick="irCheckout()">Finalizar Pedido</button>

</section>

<!-- CHECKOUT -->
<section id="checkout" class="secao">

  <h2>💳 Pagamento</h2>

  <input placeholder="Nome" id="nome">
  <input placeholder="Telefone" id="telefone">
  <input placeholder="Endereço" id="endereco">

  <select id="pagamento">
    <option>Pix</option>
    <option>Dinheiro</option>
    <option>Cartão</option>
    <option>Entrega</option>
  </select>

  <button onclick="finalizarPedido()">Confirmar Pedido</button>

</section>

<!-- STATUS -->
<section id="status" class="secao">

  <h2>📦 Status do Pedido</h2>
  <p id="statusTexto">Nenhum pedido ativo</p>
  <p id="codigoPedido"></p>

</section>

<!-- ADMIN -->
<section id="admin" class="secao">

  <h2>⚙️ Admin K-OMFOME</h2>

  <p>Pedidos recebidos:</p>
  <div id="painelPedidos"></div>

</section>

<!-- BOTÃO FLUTUANTE -->
<button class="flutuante" onclick="abrirSecao('carrinho')">🛒</button>

<script src="script.js"></script>

</body>
</html>
